name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    name: Package and publish release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run unit tests
        run: |
          python tests/test_odformat.py
          python tests/test_rhino_mock.py
      - name: Build Blender extension zip
        run: |
          cd Blender
          zip -r "od_copy_paste_external-${{ github.ref_name }}.zip" od_copy_paste_external
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --generate-notes \
            "Blender/od_copy_paste_external-${{ github.ref_name }}.zip"
