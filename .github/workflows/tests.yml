name: tests

on:
  push:
    branches: [master]
  pull_request:

jobs:
  format-unit:
    name: Format unit tests + compile checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Compile maintained scripts
        run: |
          python -m py_compile \
            Blender/od_copy_paste_external/__init__.py \
            Blender/od_copy_paste_external/odformat.py \
            Rhino/Rhino_CopyToExternal.py \
            Rhino/Rhino_PasteFromExternal.py \
            Maya/maya_ExportToExternal.py \
            Maya/maya_PasteFromExternal.py \
            Houdini/Houdini_CopyToExternal.py \
            Houdini/Houdini_PasteFromExternal.py \
            tests/test_blender_roundtrip.py \
            tests/test_odformat.py \
            tests/test_rhino_mock.py \
            tests/test_maya_mock.py \
            tests/test_c4d_mock.py \
            C4D/C4D_CopyToExternal.py \
            C4D/C4D_PasteFromExternal.py \
            tests/test_3dsmax_mock.py \
            3DSMax/3DSMax_CopyToExternal.py \
            3DSMax/3DSMax_PasteFromExternal.py \
            tests/test_obj_converter.py \
            tests/test_plasticity_bridge.py \
            tools/od_obj.py \
            tools/od_watch.py \
            Plasticity/plasticity_copy.py
      - name: odformat unit tests
        run: python tests/test_odformat.py
      - name: Rhino scripts unit tests (mocked RhinoCommon)
        run: python tests/test_rhino_mock.py
      - name: Maya scripts unit tests (stubbed OpenMaya)
        run: python tests/test_maya_mock.py
      - name: C4D scripts unit tests (stubbed c4d)
        run: python tests/test_c4d_mock.py
      - name: 3ds Max scripts unit tests (stubbed pymxs)
        run: python tests/test_3dsmax_mock.py
      - name: OBJ converter tests
        run: python tests/test_obj_converter.py
      - name: Plasticity bridge tests
        run: python tests/test_plasticity_bridge.py

  blender-roundtrip:
    name: Blender 4.2 headless round-trip
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install standalone bpy (Blender 4.2 LTS)
        run: pip install "bpy==4.2.*"
      - name: Round-trip golden files
        run: python tests/test_blender_roundtrip.py

  godot-roundtrip:
    name: Godot headless round-trip
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download Godot 4.4
        run: |
          curl -sSL -o godot.zip "https://github.com/godotengine/godot-builds/releases/download/4.4.1-stable/Godot_v4.4.1-stable_linux.x86_64.zip"
          unzip -q godot.zip
      - name: Import project
        run: ./Godot_v4.4.1-stable_linux.x86_64 --headless --path Godot --import || true
      - name: Round-trip golden files
        run: ./Godot_v4.4.1-stable_linux.x86_64 --headless --path Godot --script res://tests/roundtrip_test.gd

  package-extension:
    name: Package Blender extension
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build extension zip
        run: cd Blender && zip -r od_copy_paste_external.zip od_copy_paste_external
      - uses: actions/upload-artifact@v4
        with:
          name: od_copy_paste_external
          path: Blender/od_copy_paste_external.zip
